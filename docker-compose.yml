services:
  mongo:
    image: mongo:7
    container_name: areca-mongo
    restart: unless-stopped
    ports:
      - "27018:27017"
    volumes:
      - mongo-data:/data/db
    networks:
      - areca-net
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  hardhat:
    build:
      context: ./blockchain
      dockerfile: Dockerfile
    image: areca-hardhat:dev
    container_name: areca-hardhat
    restart: unless-stopped
    ports:
      - "8545:8545"
    networks:
      - areca-net
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- --post-data='{\"jsonrpc\":\"2.0\",\"id\":1,\"method\":\"eth_chainId\"}' --header='Content-Type:application/json' http://127.0.0.1:8545 | grep -q result"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 5s

  deploy:
    image: areca-hardhat:dev
    container_name: areca-deploy
    depends_on:
      hardhat:
        condition: service_healthy
    networks:
      - areca-net
    volumes:
      - shared-data:/shared
    environment:
      HARDHAT_NETWORK_URL: "http://hardhat:8545"
    command: ["npx", "hardhat", "run", "scripts/dockerInit.js", "--network", "external"]
    restart: "no"

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: areca-backend:dev
    container_name: areca-backend
    restart: unless-stopped
    depends_on:
      mongo:
        condition: service_healthy
      deploy:
        condition: service_completed_successfully
    environment:
      PORT: "8000"
      MONGO_URI: "mongodb://mongo:27017/areca"
      JWT_SECRET: "dev-secret-change-me-in-prod"
      JWT_EXPIRES: "7d"
      CORS_ORIGIN: "http://localhost:5173"
      MIN_BID_INCREMENT: "1"
    ports:
      - "8000:8000"
    volumes:
      - shared-data:/shared:ro
    networks:
      - areca-net

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    image: areca-frontend:dev
    container_name: areca-frontend
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    environment:
      # browser hits backend on the host's mapped port, not the container
      VITE_API_URL: "http://localhost:8000/api"
      VITE_SOCKET_URL: "http://localhost:8000"
      VITE_CHAIN_ID: "31337"
      # contract address is regenerated each boot. for now use the canonical
      # first-deploy address; a future stage can read it from /shared/contract.env
      VITE_CONTRACT_ADDRESS: "0x5FbDB2315678afecb367f032d93F642f64180aa3"
    ports:
      - "5173:5173"
    networks:
      - areca-net

networks:
  areca-net:
    driver: bridge

volumes:
  mongo-data:
  shared-data:
